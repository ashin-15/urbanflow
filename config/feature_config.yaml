# Feature Configuration for Traffic Demand Prediction

target: "traffic_demand"

datetime_col: "timestamp"

raw_numeric_features:
  - "number_of_lanes"
  - "traffic_signals"
  - "large_vehicles_count"
  - "temperature"
  - "humidity"
  - "rainfall"
  - "wind_speed"
  - "event_indicator"

raw_categorical_features:
  - "location"
  - "geohash_location"
  - "weather_condition"
  - "road_type"
  - "nearby_landmarks"

engineered_numeric_features:
  - "nearby_landmarks_count"
  - "traffic_density_score"
  - "weather_impact_score"
  - "rush_hour_indicator"
  - "hour_sin"
  - "hour_cos"
  - "month_sin"
  - "month_cos"
  - "day_sin"
  - "day_cos"
  - "lane_signal_interaction"
  - "landmark_event_interaction"
  - "temp_wind_interaction"
  - "rainfall_humidity_interaction"
  - "vehicle_lane_ratio"
  - "rush_weekend_interaction"
  - "is_weekend"
  - "day_of_week"
  - "month"
  - "hour"

engineered_categorical_features:
  - "hour_flag"

target_encoded_features:
  - "geohash_location_encoded"
  - "road_type_encoded"
  - "location_encoded"
  - "hour_location_encoded"
  - "dow_road_encoded"
